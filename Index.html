  "2026-08-17":{ex:[{t:"low",h:"10",m:"39",ht:1.97},{t:"high",h:"17",m:"15",ht:4.48,c:86},{t:"low",h:"22",m:"58",ht:1.93},{t:"high",h:"05",m:"27",ht:4.59,c:88}]},
};

function getTodayTides() {
  const today = new Date().toISOString().slice(0,10);
  const data = TIDES_SHOM[today];
  if (!data) return null;
  // Reconstruct full extremes with proper datetime
  const extremes = data.ex.map(e => ({
    type: e.t === "high" ? "high" : "low",
    datetime: `${today}T${e.h}:${e.m}:00`,
    height_m: e.ht.toFixed(2),
    coefficient: e.c || null
  }));
  const coeffs = data.ex.filter(e=>e.c).map(e=>e.c);
  const maxCoeff = coeffs.length ? Math.max(...coeffs) : null;
  return { extremes, coefficient: maxCoeff, _shom: true };
}

// ── Météo Open-Meteo gratuite ────────────────────────────────
async function fetchWeather() {
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,wind_speed_10m,wind_direction_10m,wave_height,weather_code,precipitation&wind_speed_unit=kn&timezone=Europe/Paris`);
  if (!r.ok) throw new Error("Météo indisponible");
  return (await r.json()).current;
}

// ── Règles de pêche expertes ─────────────────────────────────
function analyzeConditions(weather, tides) {
  const coeff = tides?.coefficient ?? 70;
  const wind = weather.wind_speed_10m ?? 10;
  const wave = weather.wave_height ?? 0.3;
  const precip = weather.precipitation ?? 0;
  const wcode = weather.weather_code ?? 0;

  const isStorm = wcode >= 80 || wind > 25 || wave > 1.5;
  const isRain = precip > 2;
  const isSpring = coeff >= 90;
  const isNeap = coeff <= 50;
  const calmSea = wind <= 15 && wave <= 0.8;
  const moderateSea = wind <= 20 && wave <= 1.2;

  const today = new Date().toISOString().slice(0,10);
  const todayEx = tides?.extremes?.filter(e=>e.datetime.startsWith(today)) ?? [];
  const lowTide = todayEx.find(t=>t.type==="low");
  const lowH = lowTide ? parseInt(lowTide.datetime.slice(11,13)) : 13;
  const lowM = lowTide ? lowTide.datetime.slice(14,16) : "00";
  const before = `${String((lowH-2+24)%24).padStart(2,"0")}h${lowM}`;
  const after  = `${String((lowH+1)%24).padStart(2,"0")}h${lowM}`;
  const bmStr  = `${String(lowH).padStart(2,"0")}h${lowM}`;
  const bmRange = `${before} → ${after}`;

  let score, verdict, meilleurMoment, alertes=[], conseils, demain, recommandations=[];

  if (isStorm) { score=1; verdict="Conditions difficiles — pêche déconseillée en mer"; }
  else if (isSpring && calmSea) { score=5; verdict="Conditions exceptionnelles ! 🏆"; }
  else if (isSpring && moderateSea) { score=4; verdict="Très bonne journée de pêche !"; }
  else if (!isNeap && calmSea) { score=4; verdict="Bonne journée pour sortir pêcher"; }
  else if (isNeap && calmSea) { score=3; verdict="Conditions correctes — privilégiez le lancer"; }
  else { score=2; verdict="Mer agitée — spots abrités conseillés"; }

  meilleurMoment = isSpring ? `Autour de la BM : ${bmRange}` : `Aube/crépuscule, 1h avant les étales`;

  if (isStorm) { alertes.push("Conditions dangereuses — ne pas sortir en mer !"); }
  if (wind > 25) alertes.push(`Vent fort : ${wind} nœuds`);
  if (wave > 1.5) alertes.push(`Vagues importantes : ${wave}m`);
  if (isRain) alertes.push("Pluie — prévoyez un imperméable");

  if (coeff >= 70 && !isStorm) {
    recommandations.push({
      type:"Pêche à pied",
      cibles: isSpring ? "Crevettes grises, coques, palourdes, étrilles, bigorneaux" : "Crevettes, moules, bigorneaux",
      technique:"Haveneau pour les crevettes dans les rochers, couteau pour les coques dans le sable",
      meilleurSpot:"Rochers de la Pointe de Penchâteau, plage du Nau côté rochers",
      horaire:`2h avant et 1h après la BM → ${bmRange}`,
      emoji:"🦐", faisabilite: isSpring?5:3,
      note: isSpring?"Grande vive-eau : estran très découvert, conditions idéales !":""
    });
  }

  if (!isStorm && moderateSea) {
    recommandations.push({
      type:"Bar au lancer",
      cibles:"Bar (loup), maigre en été",
      technique: wind>15 ? "Leurres souples 10-15cm, spots abrités sous le vent" : "Popper surface à l'aube/crépuscule, leurres souples sinon",
      meilleurSpot:"Jetée du Pouliguen, pointe de Penchâteau, brise-lames",
      horaire: isSpring ? `Montée de marée après ${bmStr}, coucher du soleil` : "Aube et crépuscule, 1h avant les étales",
      emoji:"🐟", faisabilite: calmSea?4:3,
      note: wind>15?`Vent ${wind} nœuds — optez pour les spots abrités`:""
    });
  }

  if (!isStorm && calmSea) {
    recommandations.push({
      type:"Dorade royale",
      cibles:"Dorade royale, dorade grise",
      technique:"Araignée de mer ou vers, fond sableux 2-8m",
      meilleurSpot:"Fond de la baie de La Baule, près des herbiers entre Le Pouliguen et Pornichet",
      horaire:"Milieu de journée par beau temps, montée de marée",
      emoji:"🐠", faisabilite: isSpring?4:3, note:""
    });
  }

  if (isStorm || (!calmSea && !moderateSea)) {
    recommandations.push({
      type:"Alternative : eau douce",
      cibles:"Sandre, brochet, perche",
      technique:"Lancer aux leurres souples ou pêche au vif",
      meilleurSpot:"Lac de Sandun à Guérande (15 min), étangs de Brière",
      horaire:"Toute la journée, aube et crépuscule de préférence",
      emoji:"🌿", faisabilite:3,
      note:"Bonne alternative par mauvais temps côtier"
    });
  }

  if (isSpring) conseils=`Coefficient ${coeff} : vive-eau ! L'estran de Le Pouliguen sera largement découvert. Munissez-vous d'un haveneau et d'un seau. Respectez la taille minimale de capture et ne prenez que ce dont vous avez besoin.`;
  else if (isNeap) conseils=`Coefficient ${coeff} (morte-eau) : peu d'estran. Privilégiez le lancer depuis la jetée ou le brise-lames. Bonne période pour cibler le bar en surface à l'aube.`;
  else conseils=`Coefficient ${coeff} intermédiaire. Les rochers de la Pointe de Penchâteau restent productifs. La jetée du Pouliguen est accessible toute la journée pour le bar et la dorade.`;

  // Demain
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowKey = tomorrow.toISOString().slice(0,10);
  const tomorrowData = TIDES_SHOM[tomorrowKey];
  if (tomorrowData) {
    const tc = tomorrowData.ex.filter(e=>e.c).map(e=>e.c);
    const tCoeff = tc.length ? Math.max(...tc) : coeff;
    const tSpring = tCoeff >= 90;
    demain = `Coefficient ${tCoeff} demain (${tSpring?"vive-eau 🔴":tCoeff<=50?"morte-eau 🔵":"intermédiaire 🟠"}). ${tSpring?"Excellentes conditions pour la pêche à pied !":"Consultez Météo France Marine pour les vents."}`;
  } else {
    demain = "Données non disponibles pour demain — consultez maree.info pour les horaires exacts.";
  }

  return { score, verdict, meilleurMoment, recommandations, alertes, conseils, demain };
}

// ── Composants ───────────────────────────────────────────────
function Stars({score}) {
  return <div style={{display:"flex",gap:"4px",justifyContent:"center"}}>
    {[1,2,3,4,5].map(i=><span key={i} style={{fontSize:"1.5rem",color:i<=score?"#f5a623":"#2a3a4a"}}>★</span>)}
  </div>;
}

function TideChip({t}) {
  const hi = t.type==="high";
  return <div style={{background:hi?"linear-gradient(135deg,#4ecdc4,#2980b9)":"linear-gradient(135deg,#2c3e50,#3498db)",borderRadius:"10px",padding:"8px 12px",minWidth:"72px",textAlign:"center"}}>
    <div style={{color:hi?"#fff":"#a0c4d8",fontSize:"0.68rem",fontWeight:"700"}}>{hi?"PM":"BM"}</div>
    <div style={{color:"#fff",fontSize:"0.9rem",fontWeight:"700"}}>{t.datetime.slice(11,16)}</div>
    <div style={{color:"rgba(255,255,255,0.8)",fontSize:"0.72rem"}}>{t.height_m}m</div>
    {t.coefficient&&<div style={{color:"#f5a623",fontSize:"0.65rem",fontWeight:"700"}}>coef.{t.coefficient}</div>}
  </div>;
}

function FishCard({rec}) {
  return <div className="fade-in" style={{background:"linear-gradient(135deg,#0d2137,#0a1a2e)",border:"1px solid #1a3a5a",borderRadius:"16px",padding:"18px",display:"flex",flexDirection:"column",gap:"10px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontSize:"2rem"}}>{rec.emoji}</span>
      <div style={{display:"flex",gap:"3px",alignItems:"flex-end",height:"28px"}}>
        {[1,2,3,4,5].map(i=><div key={i} style={{width:"9px",height:i*5+"px",background:i<=rec.faisabilite?"#4ecdc4":"#1a2a3a",borderRadius:"2px",alignSelf:"flex-end"}}/>)}
      </div>
    </div>
    <div>
      <div style={{color:"#4ecdc4",fontFamily:"'Playfair Display',serif",fontSize:"1.05rem",fontWeight:"700"}}>{rec.type}</div>
      <div style={{color:"#a0c4d8",fontSize:"0.82rem",marginTop:"2px"}}>🎯 {rec.cibles}</div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
      {[["Technique",rec.technique],["Horaire",rec.horaire]].map(([l,v])=>
        <div key={l} style={{background:"#091525",borderRadius:"8px",padding:"8px"}}>
          <div style={{color:"#4a7a9b",fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:"1px"}}>{l}</div>
          <div style={{color:"#c0d8e8",fontSize:"0.8rem",marginTop:"2px"}}>{v}</div>
        </div>
      )}
    </div>
    <div style={{background:"#091525",borderRadius:"8px",padding:"8px"}}>
      <div style={{color:"#4a7a9b",fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:"1px"}}>📍 Spot</div>
      <div style={{color:"#c0d8e8",fontSize:"0.8rem",marginTop:"2px"}}>{rec.meilleurSpot}</div>
    </div>
    {rec.note?<div style={{color:"#f5a623",fontSize:"0.78rem",background:"rgba(245,166,35,0.08)",borderRadius:"8px",padding:"8px"}}>💡 {rec.note}</div>:null}
  </div>;
}

const scoreColor = s => s>=4?"#4ecdc4":s>=3?"#f5a623":"#e74c3c";
const wxLabel = c => {
  if(c==null)return"—";if(c===0)return"☀️ Dégagé";if(c<=3)return"🌤️ Nuageux";
  if(c<=49)return"🌫️ Brouillard";if(c<=67)return"🌧️ Pluie";if(c<=82)return"🌦️ Averses";return"⛈️ Orage";
};

// ── App ──────────────────────────────────────────────────────
function App() {
  const [state, setState] = useState("loading");
  const [weather, setWeather] = useState(null);
  const [tides, setTides] = useState(null);
  const [reco, setReco] = useState(null);
  const [error, setError] = useState("");

  const run = async () => {
    setState("loading"); setError("");
    try {
      const w = await fetchWeather();
      const t = getTodayTides();
      setWeather(w); setTides(t);
      setReco(analyzeConditions(w, t));
      setState("done");
    } catch(err) { setError(err.message); setState("error"); }
  };

  useEffect(()=>{run();},[]);

  const today = new Date().toISOString().slice(0,10);
  const todayTides = tides?.extremes?.filter(e=>e.datetime.startsWith(today))||[];
  const coeff = tides?.coefficient??null;
  const isSpring=coeff>=90, isNeap=coeff<=50;
  const hasShom = tides?._shom;

  return <div style={{maxWidth:"600px",margin:"0 auto",padding:"0 16px"}}>
    <div style={{textAlign:"center",padding:"28px 0 20px"}}>
      <div style={{fontSize:"2.4rem"}}>🎣</div>
      <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(1.5rem,6vw,2.2rem)",fontWeight:"900",margin:"6px 0 0",background:"linear-gradient(135deg,#4ecdc4,#a8e6e3,#2980b9)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Pêche Le Pouliguen</h1>
      <p style={{color:"#4a7a9b",fontSize:"0.78rem",letterSpacing:"2px",textTransform:"uppercase",marginTop:"4px"}}>Marées SHOM · Météo · Conseils experts</p>
      <p style={{color:"#2a5a7a",fontSize:"0.75rem",marginTop:"4px"}}>{new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</p>
    </div>

    {state==="loading"&&<div style={{textAlign:"center",padding:"70px 20px"}}>
      <div className="spin" style={{fontSize:"3rem",marginBottom:"16px"}}>🌊</div>
      <p style={{color:"#4ecdc4",fontFamily:"'Playfair Display',serif",fontSize:"1.1rem"}}>Chargement des conditions...</p>
    </div>}

    {state==="error"&&<div style={{textAlign:"center",padding:"40px 20px"}}>
      <div style={{fontSize:"2.5rem",marginBottom:"12px"}}>⚠️</div>
      <p style={{color:"#e74c3c",fontSize:"0.9rem",marginBottom:"16px"}}>{error}</p>
      <button onClick={run} style={{background:"#4ecdc4",color:"#020c18",border:"none",borderRadius:"12px",padding:"12px 28px",fontWeight:"700",fontSize:"0.95rem",cursor:"pointer"}}>Réessayer</button>
    </div>}

    {state==="done"&&weather&&reco&&<div className="fade-in" style={{display:"flex",flexDirection:"column",gap:"14px"}}>

      <div style={{background:`linear-gradient(135deg,${scoreColor(reco.score)}22,#041428)`,border:`1px solid ${scoreColor(reco.score)}44`,borderRadius:"20px",padding:"20px",textAlign:"center"}}>
        <Stars score={reco.score}/>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.25rem",color:scoreColor(reco.score),marginTop:"8px",fontWeight:"700"}}>{reco.verdict}</div>
        <div style={{color:"#6a9ab8",marginTop:"6px",fontSize:"0.83rem"}}>⏰ <strong style={{color:"#c0d8e8"}}>{reco.meilleurMoment}</strong></div>
      </div>

      {reco.alertes?.length>0&&<div style={{background:"linear-gradient(135deg,#3d1a1a,#1a0a0a)",border:"1px solid #8b2020",borderRadius:"12px",padding:"14px 16px",display:"flex",flexDirection:"column",gap:"6px"}}>
        {reco.alertes.map((a,i)=><div key={i} style={{color:"#ff8080",fontSize:"0.85rem"}}>⚠️ {a}</div>)}
      </div>}

      <div style={{background:"linear-gradient(135deg,#0a1e35,#061525)",border:"1px solid #1a3a5a",borderRadius:"16px",padding:"16px"}}>
        <div style={{color:"#4a7a9b",fontSize:"0.68rem",textTransform:"uppercase",letterSpacing:"2px",marginBottom:"10px"}}>🌊 Conditions Météo Marine</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
          {[["Ciel",wxLabel(weather.weather_code)],["Température",weather.temperature_2m+"°C"],["Précipitations",weather.precipitation+" mm"],["Vague",(weather.wave_height??"—")+" m"]].map(([l,v])=>
            <div key={l} style={{background:"#091525",borderRadius:"10px",padding:"10px 12px"}}>
              <div style={{color:"#4a7a9b",fontSize:"0.65rem",textTransform:"uppercase"}}>{l}</div>
              <div style={{color:"#c0d8e8",fontSize:"0.85rem",marginTop:"2px"}}>{v}</div>
            </div>
          )}
        </div>
        <div style={{background:"#091525",borderRadius:"10px",padding:"10px 12px",marginTop:"8px"}}>
          <div style={{color:"#4a7a9b",fontSize:"0.65rem",textTransform:"uppercase"}}>Vent</div>
          <div style={{color:"#c0d8e8",fontSize:"0.85rem",marginTop:"2px"}}>
            <span style={{display:"inline-block",transform:`rotate(${weather.wind_direction_10m}deg)`,marginRight:"6px"}}>↑</span>
            {weather.wind_speed_10m} nœuds ({weather.wind_direction_10m}°)
          </div>
        </div>
      </div>

      <div style={{background:"linear-gradient(135deg,#0a1e35,#061525)",border:"1px solid #1a3a5a",borderRadius:"16px",padding:"16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px",flexWrap:"wrap",gap:"6px"}}>
          <div style={{color:"#4a7a9b",fontSize:"0.68rem",textTransform:"uppercase",letterSpacing:"2px"}}>
            {hasShom?"🌙 Marées SHOM Officielles":"🌙 Marées du Jour"}
          </div>
          {coeff&&<div style={{background:isSpring?"linear-gradient(135deg,#e74c3c,#c0392b)":isNeap?"linear-gradient(135deg,#2980b9,#1a6a99)":"linear-gradient(135deg,#f5a623,#d4891a)",borderRadius:"20px",padding:"3px 10px",fontSize:"0.72rem",fontWeight:"700",color:"#fff"}}>
            Coeff. {coeff} — {isSpring?"Vive-eau 🔴":isNeap?"Morte-eau 🔵":"Intermédiaire 🟠"}
          </div>}
        </div>
        {todayTides.length>0
          ? <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>{todayTides.map((t,i)=><TideChip key={i} t={t}/>)}</div>
          : <div style={{color:"#4a7a9b",fontSize:"0.82rem"}}>Données non disponibles pour aujourd'hui — <a href="https://maree.info/115" target="_blank" rel="noreferrer">maree.info</a></div>
        }
        {hasShom&&<div style={{marginTop:"8px",color:"#2a6a4a",fontSize:"0.7rem"}}>✅ Données © SHOM 2026 — officielles</div>}
        {isSpring&&<div style={{marginTop:"8px",color:"#4ecdc4",fontSize:"0.78rem",background:"rgba(78,205,196,0.08)",borderRadius:"8px",padding:"8px 10px"}}>💡 Vive-eau : grand estran découvert — idéal pour la pêche à pied !</div>}
      </div>

      <div style={{color:"#4a7a9b",fontSize:"0.68rem",textTransform:"uppercase",letterSpacing:"2px",marginTop:"4px"}}>🎯 Recommandations du Jour</div>
      {reco.recommandations.map((r,i)=><FishCard key={i} rec={r}/>)}

      <div style={{background:"linear-gradient(135deg,#0d1f10,#061525)",border:"1px solid #1a4a2a",borderRadius:"16px",padding:"16px"}}>
        <div style={{color:"#4ecdc4",fontSize:"0.68rem",textTransform:"uppercase",letterSpacing:"2px",marginBottom:"8px"}}>💡 Conseils Locaux</div>
        <p style={{color:"#a0c4a8",fontSize:"0.85rem",lineHeight:"1.6"}}>{reco.conseils}</p>
        <div style={{marginTop:"14px",paddingTop:"14px",borderTop:"1px solid #1a3a2a"}}>
          <div style={{color:"#4a7a9b",fontSize:"0.68rem",textTransform:"uppercase",letterSpacing:"2px",marginBottom:"6px"}}>📅 Prévision Demain</div>
          <p style={{color:"#8ab89a",fontSize:"0.83rem",lineHeight:"1.6"}}>{reco.demain}</p>
        </div>
      </div>

      <button onClick={run} style={{background:"linear-gradient(135deg,#4ecdc4,#2980b9)",color:"#020c18",border:"none",borderRadius:"14px",padding:"14px",width:"100%",fontWeight:"700",fontSize:"0.92rem",cursor:"pointer"}}>
        🔄 Actualiser les conditions
      </button>
      <p style={{textAlign:"center",color:"#1a3a5a",fontSize:"0.7rem"}}>
        Météo : Open-Meteo · Marées : © SHOM 2026 · 100% gratuit
      </p>
    </div>}
  </div>;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
