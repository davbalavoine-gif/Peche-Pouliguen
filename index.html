<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Pêche Le Pouliguen 🎣</title>
  <meta name="description" content="Conditions de pêche en temps réel pour Le Pouliguen" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pêche Pouliguen" />
  <meta name="theme-color" content="#020c18" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #020c18 0%, #041428 40%, #020c18 100%);
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      color: #c0d8e8;
      padding-bottom: 60px;
    }
    @keyframes spin { from{transform:rotate(0deg)}to{transform:rotate(360deg)} }
    .spin { animation: spin 2s linear infinite; display: inline-block; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    input, button { font-family: inherit; }
    a { color: #4ecdc4; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect } = React;
const LAT = 47.2714, LON = -2.4261;

// ── Helpers ──────────────────────────────────────────────────
function loadKeys() { try { return JSON.parse(localStorage.getItem("ppl_keys") || "{}"); } catch { return {}; } }
function saveKeys(k) { try { localStorage.setItem("ppl_keys", JSON.stringify(k)); } catch {} }

async function fetchWeather() {
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,wind_speed_10m,wind_direction_10m,wave_height,weather_code,precipitation&wind_speed_unit=kn&timezone=Europe/Paris`);
  if (!r.ok) throw new Error("Météo indisponible");
  return (await r.json()).current;
}

async function fetchTides(key) {
  if (!key) return null;
  const today = new Date().toISOString().slice(0,10);
  const r = await fetch(`https://tidesatlas.com/api/v1/tides?lat=${LAT}&lon=${LON}&date=${today}&days=2`, { headers: {"X-API-Key": key} });
  if (!r.ok) throw new Error(`Marées erreur ${r.status} — clé TidesAtlas invalide ?`);
  return r.json();
}

function estimateTides() {
  const now = new Date();
  const lunarDay = (now.getTime() / 86400000) % 29.5;
  const coeff = Math.round(45 + 70 * Math.abs(Math.sin((lunarDay / 29.5) * Math.PI * 2)));
  const bh = now.getDate() % 12;
  const p = n => String(n).padStart(2,"0");
  const d = now.toISOString().slice(0,10);
  return {
    extremes: [
      {type:"low",  datetime:`${d}T${p(bh)}:${p((now.getDate()*17)%60)}:00`, height_m:(coeff>90?0.8:1.8).toFixed(1)},
      {type:"high", datetime:`${d}T${p((bh+6)%24)}:${p((now.getDate()*23)%60)}:00`, height_m:(coeff>90?5.2:3.8).toFixed(1), coefficient:coeff},
      {type:"low",  datetime:`${d}T${p((bh+12)%24)}:${p((now.getDate()*11)%60)}:00`, height_m:(coeff>90?0.9:1.9).toFixed(1)},
      {type:"high", datetime:`${d}T${p((bh+18)%24)}:${p((now.getDate()*29)%60)}:00`, height_m:(coeff>90?5.0:3.6).toFixed(1), coefficient:coeff},
    ],
    coefficient: coeff, _demo: true
  };
}

// Appel IA via cors-anywhere proxy public (pas de clé nécessaire)
async function callClaude(prompt) {
  // On utilise un prompt structuré et on appelle l'API via allorigins (proxy CORS gratuit)
  const body = JSON.stringify({
    model: "claude-sonnet-4-20250514",
    max_tokens: 1000,
    messages: [{ role: "user", content: prompt }]
  });

  // Proxy CORS gratuit — encode l'URL Anthropic
  const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent("https://api.anthropic.com/v1/messages");

  const r = await fetch(proxyUrl, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "anthropic-version": "2023-06-01",
      "x-api-key": "__ANTHROPIC_KEY__"
    },
    body
  });
  if (!r.ok) throw new Error("IA indisponible (" + r.status + ")");
  const data = await r.json();
  if (data.error) throw new Error("IA : " + data.error.message);
  const text = data.content.filter(b => b.type==="text").map(b=>b.text).join("");
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

async function getAIReco(weather, tides, anthropicKey) {
  const today = new Date().toISOString().slice(0,10);
  const ex = (tides?.extremes||[]).filter(e=>e.datetime.startsWith(today));
  const coeff = tides?.coefficients?.today?.max ?? tides?.coefficient ?? "?";
  const isSpring = coeff>=90, isNeap = coeff<=50;
  const tideType = isSpring?"vive-eau":isNeap?"morte-eau":"intermédiaire";
  const tidesSummary = ex.map(t=>`${t.type==="high"?"PM":"BM"} à ${t.datetime.slice(11,16)} (${t.height_m}m${t.coefficient?`, coeff.${t.coefficient}`:""})`).join(", ")||"estimées";

  const prompt = `Tu es un expert pêche côtière à Le Pouliguen (Loire-Atlantique).
Conditions${tides?._demo?" (marées estimées)":" (SHOM officiel)"} :
- Météo: ${weather.temperature_2m}°C, vent ${weather.wind_speed_10m} nœuds (${weather.wind_direction_10m}°), vagues ${weather.wave_height??"?"}m, pluie ${weather.precipitation}mm
- Coeff SHOM: ${coeff} (${tideType})
- Marées: ${tidesSummary}
Réponds UNIQUEMENT en JSON valide sans markdown:
{"score":<1-5>,"verdict":"<phrase>","meilleurMoment":"<ex: 18h-21h>","recommandations":[{"type":"<ex:Pêche à pied>","cibles":"<espèces>","technique":"<méthode>","meilleurSpot":"<lieu précis>","horaire":"<timing>","emoji":"<emoji>","faisabilite":<1-5>}],"alertes":["<danger>"],"conseils":"<conseil local>","demain":"<prévision>"}`;

  // Tenter avec la clé Anthropic de l'utilisateur via proxy CORS
  const body = JSON.stringify({
    model: "claude-sonnet-4-20250514",
    max_tokens: 1000,
    messages: [{ role: "user", content: prompt }]
  });

  const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent("https://api.anthropic.com/v1/messages");
  const r = await fetch(proxyUrl, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "anthropic-version": "2023-06-01",
      "x-api-key": anthropicKey
    },
    body
  });
  if (!r.ok) throw new Error("IA erreur " + r.status + " — clé Anthropic invalide ?");
  const data = await r.json();
  if (data.error) throw new Error("IA : " + data.error.message);
  const text = data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

// ── UI Components ─────────────────────────────────────────────
const e = React.createElement;

function Stars({score}) {
  return e("div",{style:{display:"flex",gap:"4px",justifyContent:"center"}},
    [1,2,3,4,5].map(i=>e("span",{key:i,style:{fontSize:"1.5rem",color:i<=score?"#f5a623":"#2a3a4a"}},"★"))
  );
}

function TideChip({t}) {
  const hi = t.type==="high";
  return e("div",{style:{background:hi?"linear-gradient(135deg,#4ecdc4,#2980b9)":"linear-gradient(135deg,#2c3e50,#3498db)",borderRadius:"10px",padding:"8px 12px",minWidth:"68px",textAlign:"center"}},
    e("div",{style:{color:hi?"#fff":"#a0c4d8",fontSize:"0.68rem",fontWeight:"700"}},hi?"PM":"BM"),
    e("div",{style:{color:"#fff",fontSize:"0.9rem",fontWeight:"700"}},t.datetime.slice(11,16)),
    e("div",{style:{color:"rgba(255,255,255,0.75)",fontSize:"0.68rem"}},t.height_m+"m"),
    t.coefficient?e("div",{style:{color:"#f5a623",fontSize:"0.62rem"}},"coef."+t.coefficient):null
  );
}

function FishCard({rec}) {
  return e("div",{className:"fade-in",style:{background:"linear-gradient(135deg,#0d2137,#0a1a2e)",border:"1px solid #1a3a5a",borderRadius:"16px",padding:"18px",display:"flex",flexDirection:"column",gap:"10px"}},
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
      e("span",{style:{fontSize:"2rem"}},rec.emoji),
      e("div",{style:{display:"flex",gap:"3px",alignItems:"flex-end",height:"28px"}},
        [1,2,3,4,5].map(i=>e("div",{key:i,style:{width:"9px",height:i*5+"px",background:i<=rec.faisabilite?"#4ecdc4":"#1a2a3a",borderRadius:"2px",alignSelf:"flex-end"}}))
      )
    ),
    e("div",null,
      e("div",{style:{color:"#4ecdc4",fontFamily:"'Playfair Display',serif",fontSize:"1.05rem",fontWeight:"700"}},rec.type),
      e("div",{style:{color:"#a0c4d8",fontSize:"0.82rem",marginTop:"2px"}},"🎯 "+rec.cibles)
    ),
    e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}},
      [["Technique",rec.technique],["Horaire",rec.horaire]].map(([l,v])=>
        e("div",{key:l,style:{background:"#091525",borderRadius:"8px",padding:"8px"}},
          e("div",{style:{color:"#4a7a9b",fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:"1px"}},l),
          e("div",{style:{color:"#c0d8e8",fontSize:"0.8rem",marginTop:"2px"}},v)
        )
      )
    ),
    e("div",{style:{background:"#091525",borderRadius:"8px",padding:"8px"}},
      e("div",{style:{color:"#4a7a9b",fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:"1px"}},"📍 Spot"),
      e("div",{style:{color:"#c0d8e8",fontSize:"0.8rem",marginTop:"2px"}},rec.meilleurSpot)
    )
  );
}

function scoreColor(s) { return s>=4?"#4ecdc4":s>=3?"#f5a623":"#e74c3c"; }
function wxLabel(c) {
  if(c==null)return"—";
  if(c===0)return"☀️ Dégagé";if(c<=3)return"🌤️ Nuageux";
  if(c<=49)return"🌫️ Brouillard";if(c<=67)return"🌧️ Pluie";
  if(c<=82)return"🌦️ Averses";return"⛈️ Orage";
}

// ── Main App ─────────────────────────────────────────────────
function App() {
  const saved = loadKeys();
  const [tidesKey, setTidesKey] = useState(saved.tides||"");
  const [anthropicKey, setAnthropicKey] = useState(saved.anthropic||"");
  const [state, setState] = useState("setup");
  const [weather, setWeather] = useState(null);
  const [tides, setTides] = useState(null);
  const [reco, setReco] = useState(null);
  const [error, setError] = useState("");
  const [step, setStep] = useState("");

  const run = async (tk, ak) => {
    setState("loading"); setError("");
    try {
      setStep("Météo marine...");
      const w = await fetchWeather(); setWeather(w);

      setStep("Marées...");
      const t = tk ? await fetchTides(tk) : estimateTides(); setTides(t);

      setStep("Analyse IA...");
      const r = await getAIReco(w, t, ak); setReco(r);
      setState("done");
    } catch(err) { setError(err.message); setState("error"); }
  };

  const go = () => { saveKeys({tides:tidesKey,anthropic:anthropicKey}); run(tidesKey,anthropicKey); };

  const today = new Date().toISOString().slice(0,10);
  const todayTides = tides?.extremes?.filter(e=>e.datetime.startsWith(today))||[];
  const coeff = tides?.coefficients?.today?.max ?? tides?.coefficient ?? null;
  const isSpring=coeff>=90, isNeap=coeff<=50;

  const Header = () => e("div",{style:{textAlign:"center",padding:"28px 0 20px"}},
    e("div",{style:{fontSize:"2.4rem"}},"🎣"),
    e("h1",{style:{fontFamily:"'Playfair Display',serif",fontSize:"clamp(1.5rem,6vw,2.2rem)",fontWeight:"900",margin:"6px 0 0",background:"linear-gradient(135deg,#4ecdc4,#a8e6e3,#2980b9)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"Pêche Le Pouliguen"),
    e("p",{style:{color:"#4a7a9b",fontSize:"0.78rem",letterSpacing:"2px",textTransform:"uppercase",marginTop:"4px"}},"Marées SHOM · Météo · IA"),
    e("p",{style:{color:"#2a5a7a",fontSize:"0.75rem",marginTop:"4px"}},new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"}))
  );

  const card = (children,extra={}) => e("div",{style:{background:"linear-gradient(135deg,#0a1e35,#061525)",border:"1px solid #1a3a5a",borderRadius:"16px",padding:"16px",...extra}},children);
  const lbl = txt => e("div",{style:{color:"#4a7a9b",fontSize:"0.68rem",textTransform:"uppercase",letterSpacing:"2px",marginBottom:"10px"}},txt);
  const metaItem = (l,v) => e("div",{style:{background:"#091525",borderRadius:"10px",padding:"10px 12px"}},
    e("div",{style:{color:"#4a7a9b",fontSize:"0.65rem",textTransform:"uppercase"}},l),
    e("div",{style:{color:"#c0d8e8",fontSize:"0.85rem",marginTop:"2px"}},v)
  );

  return e("div",{style:{maxWidth:"600px",margin:"0 auto",padding:"0 16px"}},
    e(Header),

    // SETUP
    state==="setup" && e("div",{style:{display:"flex",flexDirection:"column",gap:"14px"}},
      e("div",{style:{background:"linear-gradient(135deg,#0d1f35,#061525)",border:"1px solid #1a4a7a",borderRadius:"16px",padding:"20px",display:"flex",flexDirection:"column",gap:"12px"}},
        e("div",{style:{color:"#4ecdc4",fontFamily:"'Playfair Display',serif",fontSize:"1rem"}},"🔑 Clé API Anthropic (obligatoire)"),
        e("p",{style:{color:"#7aaac8",fontSize:"0.82rem",lineHeight:"1.6"}},[
          "Obtenez une clé sur ",
          e("a",{key:"a",href:"https://console.anthropic.com",target:"_blank",rel:"noreferrer"},"console.anthropic.com"),
          " → API Keys → Create key."
        ]),
        e("input",{value:anthropicKey,onChange:ev=>setAnthropicKey(ev.target.value),placeholder:"sk-ant-... (clé Anthropic)",style:{width:"100%",background:"#091525",border:"1px solid #1a3a5a",borderRadius:"10px",padding:"10px 14px",color:"#c0d8e8",fontSize:"0.88rem",outline:"none"}}),
        e("div",{style:{color:"#4ecdc4",fontFamily:"'Playfair Display',serif",fontSize:"0.95rem",marginTop:"4px"}},"🌙 Clé TidesAtlas (optionnel — marées SHOM)"),
        e("p",{style:{color:"#7aaac8",fontSize:"0.82rem",lineHeight:"1.6"}},[
          "Gratuit sur ",
          e("a",{key:"b",href:"https://tidesatlas.com/en/api/docs",target:"_blank",rel:"noreferrer"},"tidesatlas.com"),
          ". Sans clé → marées estimées."
        ]),
        e("input",{value:tidesKey,onChange:ev=>setTidesKey(ev.target.value),placeholder:"Clé TidesAtlas (optionnel)",style:{width:"100%",background:"#091525",border:"1px solid #1a3a5a",borderRadius:"10px",padding:"10px 14px",color:"#c0d8e8",fontSize:"0.88rem",outline:"none"}}),
        e("button",{onClick:go,disabled:!anthropicKey,style:{width:"100%",background:anthropicKey?"linear-gradient(135deg,#4ecdc4,#2980b9)":"#1a3a5a",color:"#020c18",border:"none",borderRadius:"12px",padding:"13px",fontWeight:"700",fontSize:"0.95rem",cursor:anthropicKey?"pointer":"not-allowed"}},"🚀 Lancer l'analyse")
      ),
      e("p",{style:{textAlign:"center",color:"#2a4a6a",fontSize:"0.72rem"}},"Vos clés sont sauvegardées localement sur votre appareil uniquement.")
    ),

    // LOADING
    state==="loading" && e("div",{style:{textAlign:"center",padding:"70px 20px"}},
      e("div",{className:"spin",style:{fontSize:"3rem",marginBottom:"16px"}},"🌊"),
      e("p",{style:{color:"#4ecdc4",fontFamily:"'Playfair Display',serif",fontSize:"1.1rem"}},step)
    ),

    // ERROR
    state==="error" && e("div",{style:{textAlign:"center",padding:"40px 20px"}},
      e("div",{style:{fontSize:"2.5rem",marginBottom:"12px"}},"⚠️"),
      e("p",{style:{color:"#e74c3c",fontSize:"0.9rem",marginBottom:"16px"}},error),
      e("button",{onClick:()=>setState("setup"),style:{background:"#4ecdc4",color:"#020c18",border:"none",borderRadius:"12px",padding:"12px 28px",fontWeight:"700",fontSize:"0.95rem",cursor:"pointer"}},"← Retour")
    ),

    // RESULTS
    state==="done" && weather && tides && reco && e("div",{className:"fade-in",style:{display:"flex",flexDirection:"column",gap:"14px"}},
      // Score
      e("div",{style:{background:`linear-gradient(135deg,${scoreColor(reco.score)}22,#041428)`,border:`1px solid ${scoreColor(reco.score)}44`,borderRadius:"20px",padding:"20px",textAlign:"center"}},
        e(Stars,{score:reco.score}),
        e("div",{style:{fontFamily:"'Playfair Display',serif",fontSize:"1.25rem",color:scoreColor(reco.score),marginTop:"8px",fontWeight:"700"}},reco.verdict),
        e("div",{style:{color:"#6a9ab8",marginTop:"6px",fontSize:"0.83rem"}},
          "⏰ ",e("strong",{style:{color:"#c0d8e8"}},reco.meilleurMoment)
        )
      ),

      // Alertes
      reco.alertes?.length>0 && e("div",{style:{background:"linear-gradient(135deg,#3d1a1a,#1a0a0a)",border:"1px solid #8b2020",borderRadius:"12px",padding:"14px 16px",display:"flex",flexDirection:"column",gap:"6px"}},
        reco.alertes.map((a,i)=>e("div",{key:i,style:{color:"#ff8080",fontSize:"0.85rem"}},"⚠️ "+a))
      ),

      // Météo
      card([
        lbl("🌊 Conditions Météo Marine"),
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}},
          metaItem("Ciel",wxLabel(weather.weather_code)),
          metaItem("Température",weather.temperature_2m+"°C"),
          metaItem("Précipitations",weather.precipitation+" mm"),
          metaItem("Vague",(weather.wave_height??"—")+" m")
        ),
        e("div",{style:{background:"#091525",borderRadius:"10px",padding:"10px 12px",marginTop:"8px"}},
          e("div",{style:{color:"#4a7a9b",fontSize:"0.65rem",textTransform:"uppercase"}},"Vent"),
          e("div",{style:{color:"#c0d8e8",fontSize:"0.85rem",marginTop:"2px"}},
            e("span",{style:{display:"inline-block",transform:`rotate(${weather.wind_direction_10m}deg)`,marginRight:"6px"}},"↑"),
            weather.wind_speed_10m+" nœuds ("+weather.wind_direction_10m+"°)"
          )
        )
      ]),

      // Marées
      card([
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px",flexWrap:"wrap",gap:"6px"}},
          lbl(tides._demo?"🌙 Marées (estimées)":"🌙 Marées SHOM Officielles"),
          coeff&&e("div",{style:{background:isSpring?"linear-gradient(135deg,#e74c3c,#c0392b)":isNeap?"linear-gradient(135deg,#2980b9,#1a6a99)":"linear-gradient(135deg,#f5a623,#d4891a)",borderRadius:"20px",padding:"3px 10px",fontSize:"0.72rem",fontWeight:"700",color:"#fff"}},"Coeff."+coeff+" — "+(isSpring?"Vive-eau 🔴":isNeap?"Morte-eau 🔵":"Intermédiaire 🟠"))
        ),
        e("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap"}},
          todayTides.map((t,i)=>e(TideChip,{key:i,t}))
        ),
        isSpring&&e("div",{style:{marginTop:"10px",color:"#4ecdc4",fontSize:"0.78rem",background:"rgba(78,205,196,0.08)",borderRadius:"8px",padding:"8px 10px"}},"💡 Vive-eau : grand estran découvert — idéal pour la pêche à pied !"),
        tides._demo&&e("div",{style:{marginTop:"8px",color:"#4a7a9b",fontSize:"0.72rem"}},"Mode démo — ajoutez une clé TidesAtlas pour les données SHOM officielles")
      ]),

      // Recommandations
      e("div",{style:{color:"#4a7a9b",fontSize:"0.68rem",textTransform:"uppercase",letterSpacing:"2px",marginTop:"4px"}},"🎯 Recommandations du Jour"),
      ...reco.recommandations.map((r,i)=>e(FishCard,{key:i,rec:r})),

      // Conseils
      e("div",{style:{background:"linear-gradient(135deg,#0d1f10,#061525)",border:"1px solid #1a4a2a",borderRadius:"16px",padding:"16px"}},
        e("div",{style:{color:"#4ecdc4",fontSize:"0.68rem",textTransform:"uppercase",letterSpacing:"2px",marginBottom:"8px"}},"💡 Conseils Locaux"),
        e("p",{style:{color:"#a0c4a8",fontSize:"0.85rem",lineHeight:"1.6"}},reco.conseils),
        e("div",{style:{marginTop:"14px",paddingTop:"14px",borderTop:"1px solid #1a3a2a"}},
          e("div",{style:{color:"#4a7a9b",fontSize:"0.68rem",textTransform:"uppercase",letterSpacing:"2px",marginBottom:"6px"}},"📅 Prévision Demain"),
          e("p",{style:{color:"#8ab89a",fontSize:"0.83rem",lineHeight:"1.6"}},reco.demain)
        )
      ),

      // Boutons
      e("div",{style:{display:"flex",gap:"10px"}},
        e("button",{onClick:()=>run(tidesKey,anthropicKey),style:{flex:2,background:"linear-gradient(135deg,#4ecdc4,#2980b9)",color:"#020c18",border:"none",borderRadius:"14px",padding:"14px",fontWeight:"700",fontSize:"0.92rem",cursor:"pointer"}},"🔄 Actualiser"),
        e("button",{onClick:()=>setState("setup"),style:{flex:1,background:"#091525",color:"#4a7a9b",border:"1px solid #1a3a5a",borderRadius:"14px",padding:"14px",fontWeight:"500",fontSize:"0.85rem",cursor:"pointer"}},"⚙️ Clés")
      ),
      e("p",{style:{textAlign:"center",color:"#1a3a5a",fontSize:"0.7rem"}},"Météo: Open-Meteo · Marées: SHOM/TidesAtlas · IA: Claude")
    )
  );
}

ReactDOM.render(e(App), document.getElementById("root"));
</script>
</body>
</html>
