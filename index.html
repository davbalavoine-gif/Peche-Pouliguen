<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Pêche Le Pouliguen 🎣</title>
  <meta name="description" content="Conditions de pêche en temps réel pour Le Pouliguen — météo, marées SHOM, recommandations IA" />
  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pêche Pouliguen" />
  <meta name="theme-color" content="#020c18" />
  <link rel="apple-touch-icon" href="https://favi.deno.dev/🎣.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #020c18 0%, #041428 40%, #020c18 100%);
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      color: #c0d8e8;
      padding-bottom: 60px;
    }
    input { font-family: inherit; }
    button { font-family: inherit; cursor: pointer; }
    a { color: #4ecdc4; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spin { animation: spin 2s linear infinite; display: inline-block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const POULIGUEN_LAT = 47.2714;
    const POULIGUEN_LON = -2.4261;

    const STORAGE_KEY = "pouliguen_api_keys";

    function loadSavedKeys() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
      catch { return {}; }
    }
    function saveKeys(keys) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(keys)); } catch {}
    }

    async function fetchWeather() {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${POULIGUEN_LAT}&longitude=${POULIGUEN_LON}&current=temperature_2m,wind_speed_10m,wind_direction_10m,wave_height,weather_code,precipitation&wind_speed_unit=kn&timezone=Europe/Paris`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("Météo indisponible");
      const data = await res.json();
      return data.current;
    }

    async function fetchTides(tidesKey) {
      if (!tidesKey || tidesKey === "DEMO") return null;
      const today = new Date().toISOString().slice(0, 10);
      const url = `https://tidesatlas.com/api/v1/tides?lat=${POULIGUEN_LAT}&lon=${POULIGUEN_LON}&date=${today}&days=2`;
      const res = await fetch(url, { headers: { "X-API-Key": tidesKey } });
      if (!res.ok) throw new Error(`Marées : erreur ${res.status} — vérifiez votre clé TidesAtlas`);
      return res.json();
    }

    function estimateTidesFromLunar() {
      const now = new Date();
      const lunarDay = (now.getTime() / 86400000) % 29.5;
      const coeff = Math.round(45 + 70 * Math.abs(Math.sin((lunarDay / 29.5) * Math.PI * 2)));
      const baseHour = now.getDate() % 12;
      const pad = n => String(n).padStart(2, "0");
      const extremes = [
        { type: "low",  datetime: `${now.toISOString().slice(0,10)}T${pad(baseHour)}:${pad((now.getDate()*17)%60)}:00`, height_m: (coeff > 90 ? 0.8 : 1.8).toFixed(1) },
        { type: "high", datetime: `${now.toISOString().slice(0,10)}T${pad((baseHour+6)%24)}:${pad((now.getDate()*23)%60)}:00`, height_m: (coeff > 90 ? 5.2 : 3.8).toFixed(1), coefficient: coeff },
        { type: "low",  datetime: `${now.toISOString().slice(0,10)}T${pad((baseHour+12)%24)}:${pad((now.getDate()*11)%60)}:00`, height_m: (coeff > 90 ? 0.9 : 1.9).toFixed(1) },
        { type: "high", datetime: `${now.toISOString().slice(0,10)}T${pad((baseHour+18)%24)}:${pad((now.getDate()*29)%60)}:00`, height_m: (coeff > 90 ? 5.0 : 3.6).toFixed(1), coefficient: coeff },
      ];
      return { extremes, coefficient: coeff, _demo: true };
    }

    async function getAIRecommendation(weather, tidesData, anthropicKey) {
      const todayExtremes = (tidesData?.extremes || []).filter(e => e.datetime.startsWith(new Date().toISOString().slice(0,10)));
      const coeff = tidesData?.coefficients?.today?.max ?? tidesData?.coefficient ?? "?";
      const isSpring = coeff >= 90, isNeap = coeff <= 50;
      const tideType = isSpring ? "vive-eau" : isNeap ? "morte-eau" : "intermédiaire";
      const tidesSummary = todayExtremes.map(t =>
        `${t.type === "high" ? "PM" : "BM"} à ${t.datetime.slice(11,16)} (${t.height_m}m${t.coefficient ? `, coeff. ${t.coefficient}` : ""})`
      ).join(", ") || "estimées";

      const prompt = `Tu es un expert en pêche côtière à Le Pouliguen (Loire-Atlantique, France).
Conditions actuelles${tidesData?._demo ? " (marées estimées, mode démo)" : " (données officielles SHOM)"} :
- Météo : ${weather.temperature_2m}°C, vent ${weather.wind_speed_10m} nœuds (${weather.wind_direction_10m}°), vagues ${weather.wave_height ?? "?"}m, précipitations ${weather.precipitation}mm
- Coefficient SHOM : ${coeff} (${tideType})
- Marées : ${tidesSummary}

Donne une recommandation de pêche CONCRÈTE pour aujourd'hui et demain à Le Pouliguen.
JSON strict uniquement (sans markdown ni backticks) :
{"score":<1-5>,"verdict":"<phrase courte>","meilleurMoment":"<ex: Ce soir 18h-21h>","recommandations":[{"type":"<ex: Pêche à pied>","cibles":"<espèces>","technique":"<méthode>","meilleurSpot":"<lieu précis Le Pouliguen>","horaire":"<timing marée>","emoji":"<1 emoji>","faisabilite":<1-5>}],"alertes":["<danger si applicable>"],"conseils":"<conseil local>","demain":"<prévision courte>"}`;

      const headers = { "Content-Type": "application/json" };
      if (anthropicKey) headers["X-API-Key"] = anthropicKey; // handled by proxy if empty

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers,
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });
      const data = await response.json();
      if (data.error) throw new Error("IA : " + (data.error.message || "erreur inconnue"));
      const text = data.content.filter(b => b.type === "text").map(b => b.text).join("");
      return JSON.parse(text.replace(/```json|```/g, "").trim());
    }

    // ── Components ─────────────────────────────────────────────

    function ScoreStars({ score }) {
      return React.createElement("div", { style: { display: "flex", gap: "4px", justifyContent: "center" } },
        [1,2,3,4,5].map(i =>
          React.createElement("span", { key: i, style: { fontSize: "1.5rem", color: i <= score ? "#f5a623" : "#2a3a4a" } }, "★")
        )
      );
    }

    function WindArrow({ deg }) {
      return React.createElement("span", { style: { display: "inline-block", transform: `rotate(${deg}deg)`, fontSize: "1.1rem" } }, "↑");
    }

    function TideCard({ t }) {
      const isHigh = t.type === "high";
      return React.createElement("div", {
        style: {
          background: isHigh ? "linear-gradient(135deg,#4ecdc4,#2980b9)" : "linear-gradient(135deg,#2c3e50,#3498db)",
          borderRadius: "10px", padding: "8px 12px", minWidth: "68px", textAlign: "center"
        }
      },
        React.createElement("div", { style: { color: isHigh ? "#fff" : "#a0c4d8", fontSize: "0.68rem", fontWeight: "700" } }, isHigh ? "PM" : "BM"),
        React.createElement("div", { style: { color: "#fff", fontSize: "0.9rem", fontWeight: "700" } }, t.datetime.slice(11,16)),
        React.createElement("div", { style: { color: "rgba(255,255,255,0.75)", fontSize: "0.68rem" } }, t.height_m + "m"),
        t.coefficient ? React.createElement("div", { style: { color: "#f5a623", fontSize: "0.62rem", marginTop: "1px" } }, "coef. " + t.coefficient) : null
      );
    }

    function FishCard({ rec }) {
      return React.createElement("div", {
        className: "fade-in",
        style: {
          background: "linear-gradient(135deg,#0d2137,#0a1a2e)",
          border: "1px solid #1a3a5a", borderRadius: "16px", padding: "18px",
          display: "flex", flexDirection: "column", gap: "10px"
        }
      },
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
          React.createElement("span", { style: { fontSize: "2rem" } }, rec.emoji),
          React.createElement("div", { style: { display: "flex", gap: "3px", alignItems: "flex-end", height: "28px" } },
            [1,2,3,4,5].map(i => React.createElement("div", {
              key: i,
              style: { width: "9px", height: i*5+"px", background: i <= rec.faisabilite ? "#4ecdc4" : "#1a2a3a", borderRadius: "2px", alignSelf: "flex-end" }
            }))
          )
        ),
        React.createElement("div", null,
          React.createElement("div", { style: { color: "#4ecdc4", fontFamily: "'Playfair Display',serif", fontSize: "1.05rem", fontWeight: "700" } }, rec.type),
          React.createElement("div", { style: { color: "#a0c4d8", fontSize: "0.82rem", marginTop: "2px" } }, "🎯 " + rec.cibles)
        ),
        React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px" } },
          [["Technique", rec.technique], ["Horaire", rec.horaire]].map(([label, val]) =>
            React.createElement("div", { key: label, style: { background: "#091525", borderRadius: "8px", padding: "8px" } },
              React.createElement("div", { style: { color: "#4a7a9b", fontSize: "0.65rem", textTransform: "uppercase", letterSpacing: "1px" } }, label),
              React.createElement("div", { style: { color: "#c0d8e8", fontSize: "0.8rem", marginTop: "2px" } }, val)
            )
          )
        ),
        React.createElement("div", { style: { background: "#091525", borderRadius: "8px", padding: "8px" } },
          React.createElement("div", { style: { color: "#4a7a9b", fontSize: "0.65rem", textTransform: "uppercase", letterSpacing: "1px" } }, "📍 Spot recommandé"),
          React.createElement("div", { style: { color: "#c0d8e8", fontSize: "0.8rem", marginTop: "2px" } }, rec.meilleurSpot)
        )
      );
    }

    function Card({ children, style = {} }) {
      return React.createElement("div", {
        style: { background: "linear-gradient(135deg,#0a1e35,#061525)", border: "1px solid #1a3a5a", borderRadius: "16px", padding: "16px", ...style }
      }, children);
    }

    function Label({ children }) {
      return React.createElement("div", {
        style: { color: "#4a7a9b", fontSize: "0.68rem", textTransform: "uppercase", letterSpacing: "2px", marginBottom: "10px" }
      }, children);
    }

    function MeteoItem({ label, value }) {
      return React.createElement("div", { style: { background: "#091525", borderRadius: "10px", padding: "10px 12px" } },
        React.createElement("div", { style: { color: "#4a7a9b", fontSize: "0.65rem", textTransform: "uppercase" } }, label),
        React.createElement("div", { style: { color: "#c0d8e8", fontSize: "0.85rem", marginTop: "2px" } }, value)
      );
    }

    function weatherLabel(code) {
      if (code == null) return "—";
      if (code === 0) return "☀️ Dégagé";
      if (code <= 3) return "🌤️ Nuageux";
      if (code <= 49) return "🌫️ Brouillard";
      if (code <= 67) return "🌧️ Pluie";
      if (code <= 82) return "🌦️ Averses";
      return "⛈️ Orage";
    }

    function scoreColor(s) {
      if (!s) return "#666";
      if (s >= 4) return "#4ecdc4";
      if (s >= 3) return "#f5a623";
      return "#e74c3c";
    }

    // ── Main App ────────────────────────────────────────────────

    function App() {
      const saved = loadSavedKeys();
      const [tidesKey, setTidesKey] = useState(saved.tides || "");
      const [state, setState] = useState("setup"); // setup | loading | done | error
      const [weather, setWeather] = useState(null);
      const [tidesData, setTidesData] = useState(null);
      const [reco, setReco] = useState(null);
      const [error, setError] = useState("");
      const [loadingStep, setLoadingStep] = useState("");

      const run = async (tKey) => {
        setState("loading");
        setError("");
        try {
          setLoadingStep("Météo marine en cours...");
          const w = await fetchWeather();
          setWeather(w);

          setLoadingStep("Marées SHOM...");
          let t;
          if (tKey && tKey !== "DEMO") {
            t = await fetchTides(tKey);
          } else {
            t = estimateTidesFromLunar();
          }
          setTidesData(t);

          setLoadingStep("Analyse IA des conditions...");
          const r = await getAIRecommendation(w, t);
          setReco(r);
          setState("done");
        } catch(e) {
          setError(e.message);
          setState("error");
        }
      };

      const handleStart = () => {
        saveKeys({ tides: tidesKey });
        run(tidesKey);
      };

      const today = new Date().toISOString().slice(0,10);
      const todayTides = tidesData?.extremes?.filter(e => e.datetime.startsWith(today)) || [];
      const coeff = tidesData?.coefficients?.today?.max ?? tidesData?.coefficient ?? null;
      const isSpring = coeff >= 90, isNeap = coeff <= 50;

      return React.createElement("div", { style: { maxWidth: "600px", margin: "0 auto", padding: "0 16px" } },

        // Header
        React.createElement("div", { style: { textAlign: "center", padding: "28px 0 20px" } },
          React.createElement("div", { style: { fontSize: "2.4rem" } }, "🎣"),
          React.createElement("h1", {
            style: {
              fontFamily: "'Playfair Display',serif", fontSize: "clamp(1.5rem,6vw,2.2rem)",
              fontWeight: "900", margin: "6px 0 0",
              background: "linear-gradient(135deg,#4ecdc4 0%,#a8e6e3 50%,#2980b9 100%)",
              WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent"
            }
          }, "Pêche Le Pouliguen"),
          React.createElement("p", { style: { color: "#4a7a9b", fontSize: "0.78rem", letterSpacing: "2px", textTransform: "uppercase", marginTop: "4px" } },
            "Marées SHOM · Météo · IA"
          ),
          React.createElement("p", { style: { color: "#2a5a7a", fontSize: "0.75rem", marginTop: "4px" } },
            new Date().toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" })
          )
        ),

        // ── SETUP ──
        state === "setup" && React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: "14px" } },
          React.createElement(Card, { style: { background: "linear-gradient(135deg,#0d1f35,#061525)", border: "1px solid #1a4a7a" } },
            React.createElement("div", { style: { color: "#4ecdc4", fontFamily: "'Playfair Display',serif", fontSize: "1rem", marginBottom: "10px" } }, "🔑 Clé API TidesAtlas (marées SHOM)"),
            React.createElement("p", { style: { color: "#7aaac8", fontSize: "0.82rem", lineHeight: "1.6", marginBottom: "12px" } },
              "Pour les coefficients SHOM officiels, obtenez une clé ", React.createElement("strong", null, "gratuite"), " sur ",
              React.createElement("a", { href: "https://tidesatlas.com/en/api/docs", target: "_blank", rel: "noreferrer" }, "tidesatlas.com"),
              " (50 crédits, aucune CB)."
            ),
            React.createElement("input", {
              value: tidesKey,
              onChange: e => setTidesKey(e.target.value),
              placeholder: "Collez votre clé TidesAtlas ici...",
              style: {
                width: "100%", background: "#091525", border: "1px solid #1a3a5a",
                borderRadius: "10px", padding: "10px 14px", color: "#c0d8e8",
                fontSize: "0.88rem", outline: "none", marginBottom: "10px"
              }
            }),
            React.createElement("button", {
              onClick: handleStart,
              style: {
                width: "100%", background: "linear-gradient(135deg,#4ecdc4,#2980b9)",
                color: "#020c18", border: "none", borderRadius: "12px",
                padding: "13px", fontWeight: "700", fontSize: "0.95rem"
              }
            }, tidesKey ? "🚀 Lancer avec marées SHOM" : "🚀 Lancer (mode démo sans clé)")
          ),

          React.createElement("p", { style: { textAlign: "center", color: "#2a4a6a", fontSize: "0.72rem" } },
            "Sans clé → marées estimées par cycle lunaire"
          )
        ),

        // ── LOADING ──
        state === "loading" && React.createElement("div", { style: { textAlign: "center", padding: "70px 20px" } },
          React.createElement("div", { className: "spin", style: { fontSize: "3rem", marginBottom: "16px" } }, "🌊"),
          React.createElement("p", { style: { color: "#4ecdc4", fontFamily: "'Playfair Display',serif", fontSize: "1.1rem" } }, loadingStep),
          React.createElement("p", { style: { color: "#2a5a7a", fontSize: "0.78rem", marginTop: "6px" } }, "Analyse en cours…")
        ),

        // ── ERROR ──
        state === "error" && React.createElement("div", { style: { textAlign: "center", padding: "40px 20px" } },
          React.createElement("div", { style: { fontSize: "2.5rem", marginBottom: "12px" } }, "⚠️"),
          React.createElement("p", { style: { color: "#e74c3c", fontSize: "0.9rem", marginBottom: "16px" } }, error),
          React.createElement("button", {
            onClick: () => setState("setup"),
            style: { background: "#4ecdc4", color: "#020c18", border: "none", borderRadius: "12px", padding: "12px 28px", fontWeight: "700", fontSize: "0.95rem" }
          }, "← Retour")
        ),

        // ── RESULTS ──
        state === "done" && weather && tidesData && reco && React.createElement("div", {
          className: "fade-in",
          style: { display: "flex", flexDirection: "column", gap: "14px" }
        },

          // Score
          React.createElement("div", {
            style: {
              background: `linear-gradient(135deg,${scoreColor(reco.score)}22,#041428)`,
              border: `1px solid ${scoreColor(reco.score)}44`,
              borderRadius: "20px", padding: "20px", textAlign: "center"
            }
          },
            React.createElement(ScoreStars, { score: reco.score }),
            React.createElement("div", { style: { fontFamily: "'Playfair Display',serif", fontSize: "1.25rem", color: scoreColor(reco.score), marginTop: "8px", fontWeight: "700" } }, reco.verdict),
            React.createElement("div", { style: { color: "#6a9ab8", marginTop: "6px", fontSize: "0.83rem" } },
              "⏰ ", React.createElement("strong", { style: { color: "#c0d8e8" } }, reco.meilleurMoment)
            )
          ),

          // Alertes
          reco.alertes?.length > 0 && React.createElement("div", {
            style: { background: "linear-gradient(135deg,#3d1a1a,#1a0a0a)", border: "1px solid #8b2020", borderRadius: "12px", padding: "14px 16px", display: "flex", flexDirection: "column", gap: "6px" }
          }, reco.alertes.map((a, i) => React.createElement("div", { key: i, style: { color: "#ff8080", fontSize: "0.85rem" } }, "⚠️ " + a))),

          // Météo
          React.createElement(Card, null,
            React.createElement(Label, null, "🌊 Conditions Météo Marine"),
            React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px" } },
              React.createElement(MeteoItem, { label: "Ciel", value: weatherLabel(weather.weather_code) }),
              React.createElement(MeteoItem, { label: "Température", value: weather.temperature_2m + "°C" }),
              React.createElement(MeteoItem, { label: "Précipitations", value: weather.precipitation + " mm" }),
              React.createElement(MeteoItem, { label: "Vague", value: (weather.wave_height ?? "—") + " m" }),
            ),
            React.createElement("div", { style: { background: "#091525", borderRadius: "10px", padding: "10px 12px", marginTop: "8px", display: "flex", alignItems: "center", gap: "8px" } },
              React.createElement("div", { style: { flex: 1 } },
                React.createElement("div", { style: { color: "#4a7a9b", fontSize: "0.65rem", textTransform: "uppercase" } }, "Vent"),
                React.createElement("div", { style: { color: "#c0d8e8", fontSize: "0.85rem", marginTop: "2px", display: "flex", alignItems: "center", gap: "6px" } },
                  React.createElement(WindArrow, { deg: weather.wind_direction_10m }),
                  weather.wind_speed_10m + " nœuds (" + weather.wind_direction_10m + "°)"
                )
              )
            )
          ),

          // Marées
          React.createElement(Card, null,
            React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px", flexWrap: "wrap", gap: "6px" } },
              React.createElement(Label, { style: { marginBottom: 0 } }, tidesData._demo ? "🌙 Marées (estimées)" : "🌙 Marées SHOM Officielles"),
              coeff && React.createElement("div", {
                style: {
                  background: isSpring ? "linear-gradient(135deg,#e74c3c,#c0392b)" : isNeap ? "linear-gradient(135deg,#2980b9,#1a6a99)" : "linear-gradient(135deg,#f5a623,#d4891a)",
                  borderRadius: "20px", padding: "3px 10px", fontSize: "0.72rem", fontWeight: "700", color: "#fff"
                }
              }, "Coeff. " + coeff + " — " + (isSpring ? "Vive-eau 🔴" : isNeap ? "Morte-eau 🔵" : "Intermédiaire 🟠"))
            ),
            React.createElement("div", { style: { display: "flex", gap: "8px", flexWrap: "wrap" } },
              todayTides.map((t, i) => React.createElement(TideCard, { key: i, t }))
            ),
            isSpring && React.createElement("div", {
              style: { marginTop: "10px", color: "#4ecdc4", fontSize: "0.78rem", background: "rgba(78,205,196,0.08)", borderRadius: "8px", padding: "8px 10px" }
            }, "💡 Vive-eau : grand estran découvert — idéal pour la pêche à pied !"),
            tidesData._demo && React.createElement("div", {
              style: { marginTop: "8px", color: "#4a7a9b", fontSize: "0.72rem" }
            }, "Mode démo — obtenez une clé TidesAtlas pour les données SHOM officielles")
          ),

          // Recommandations
          React.createElement("div", { style: { color: "#4a7a9b", fontSize: "0.68rem", textTransform: "uppercase", letterSpacing: "2px", marginTop: "4px" } }, "🎯 Recommandations du Jour"),
          ...reco.recommandations.map((r, i) => React.createElement(FishCard, { key: i, rec: r })),

          // Conseils & Demain
          React.createElement("div", {
            style: { background: "linear-gradient(135deg,#0d1f10,#061525)", border: "1px solid #1a4a2a", borderRadius: "16px", padding: "16px" }
          },
            React.createElement("div", { style: { color: "#4ecdc4", fontSize: "0.68rem", textTransform: "uppercase", letterSpacing: "2px", marginBottom: "8px" } }, "💡 Conseils Locaux"),
            React.createElement("p", { style: { color: "#a0c4a8", fontSize: "0.85rem", lineHeight: "1.6" } }, reco.conseils),
            React.createElement("div", { style: { marginTop: "14px", paddingTop: "14px", borderTop: "1px solid #1a3a2a" } },
              React.createElement("div", { style: { color: "#4a7a9b", fontSize: "0.68rem", textTransform: "uppercase", letterSpacing: "2px", marginBottom: "6px" } }, "📅 Prévision Demain"),
              React.createElement("p", { style: { color: "#8ab89a", fontSize: "0.83rem", lineHeight: "1.6" } }, reco.demain)
            )
          ),

          // Boutons
          React.createElement("div", { style: { display: "flex", gap: "10px" } },
            React.createElement("button", {
              onClick: () => run(tidesKey),
              style: { flex: 2, background: "linear-gradient(135deg,#4ecdc4,#2980b9)", color: "#020c18", border: "none", borderRadius: "14px", padding: "14px", fontWeight: "700", fontSize: "0.92rem" }
            }, "🔄 Actualiser"),
            React.createElement("button", {
              onClick: () => setState("setup"),
              style: { flex: 1, background: "#091525", color: "#4a7a9b", border: "1px solid #1a3a5a", borderRadius: "14px", padding: "14px", fontWeight: "500", fontSize: "0.85rem" }
            }, "⚙️ Clé")
          ),

          React.createElement("p", { style: { textAlign: "center", color: "#1a3a5a", fontSize: "0.7rem" } },
            "Météo : Open-Meteo · Marées : SHOM via TidesAtlas · IA : Claude"
          )
        )
      );
    }

    ReactDOM.render(React.createElement(App), document.getElementById("root"));
  </script>
</body>
</html>
